<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplement Overlap Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .bottle-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottle-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(16 185 129); }
        .day-btn { transition: all 0.2s; }
        .day-btn.active { background-color: #10b981; color: white; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-xl font-bold">💊</div>
            <h1 class="text-3xl font-semibold tracking-tight">Supplement Overlap</h1>
        </div>
        <div class="flex items-center gap-x-4">
            <div id="auth-status" class="text-sm font-medium text-gray-600"></div>
            <button onclick="signInWithGoogle()" class="px-5 py-2 text-sm bg-white border border-gray-300 hover:border-emerald-500 rounded-2xl">Sign in with Google</button>
            <button onclick="signInAnonymously()" class="px-5 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-2xl">Anonymous</button>
            <button onclick="syncToCloud()" class="px-5 py-2 text-sm bg-emerald-600 text-white rounded-2xl flex items-center gap-2">
                💾 Save to Cloud
            </button>
            <button onclick="loadFromCloud()" class="px-5 py-2 text-sm border border-emerald-300 hover:bg-emerald-50 rounded-2xl flex items-center gap-2">
                🔄 Load from Cloud
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6">
        <div class="flex border-b border-gray-200">
            <button onclick="switchTab(0)" id="tab-0" class="tab-button px-8 py-4 font-medium text-lg border-b-2 border-transparent hover:text-emerald-600 active">📦 My Bottles</button>
            <button onclick="switchTab(1)" id="tab-1" class="tab-button px-8 py-4 font-medium text-lg border-b-2 border-transparent hover:text-emerald-600">📊 Daily Totals</button>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8">
    <!-- TAB 0: MY BOTTLES -->
    <div id="tab-content-0">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-semibold">Your Supplement Bottles</h2>
            <button onclick="showAddBottleModal()" class="flex items-center gap-x-3 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-3xl font-semibold text-lg shadow-lg shadow-emerald-500/30">
                <span class="text-2xl leading-none">+</span> ADD BOTTLE
            </button>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
            <div class="text-6xl mb-6">💊</div>
            <h3 class="text-2xl font-medium mb-2">No bottles yet</h3>
            <p class="text-gray-500">Add bottles and set when you take them. Data will sync to the cloud.</p>
        </div>

        <div id="bottles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- TAB 1: DAILY TOTALS -->
    <div id="tab-content-1" class="hidden">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-semibold">Daily Supplement Totals</h2>
            <div class="flex gap-1" id="day-selector"></div>
        </div>
        <div id="totals-container" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8"></div>
    </div>
</div>

<!-- ADD / EDIT MODAL (same as previous version) -->
<div id="modal" onclick="if(event.target.id === 'modal') hideModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div onclick="event.stopImmediatePropagation()" class="modal bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
        <!-- Modal content - identical to your last working version -->
        <div class="px-8 pt-8 pb-6">
            <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add New Bottle</h3>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Bottle / Product Name</label>
                    <input id="bottle-name-input" type="text" placeholder="e.g. Nature Made Vitamin C 1000mg" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-emerald-300 text-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-3">How often do you take this?</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setQuickSchedule(0)" class="quick-btn px-5 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm font-medium">Every Day</button>
                        <button onclick="setQuickSchedule(1)" class="quick-btn px-5 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm font-medium">Every Other Day</button>
                        <button onclick="setQuickSchedule(2)" class="quick-btn px-5 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm font-medium">Once a Week</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-3">Or select specific days</label>
                    <div id="days-container" class="grid grid-cols-7 gap-3"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-medium text-gray-600">Supplements in this bottle</label>
                        <button onclick="addSupplementRow()" class="text-emerald-600 hover:text-emerald-700 text-sm font-medium flex items-center gap-x-1">
                            <span class="text-xl">+</span> Add supplement
                        </button>
                    </div>
                    <div id="supplements-container" class="space-y-4 max-h-80 overflow-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 px-8 py-6 flex items-center justify-between border-t">
            <button onclick="hideModal()" class="px-8 py-4 text-gray-500 font-medium hover:bg-white rounded-3xl">Cancel</button>
            <button onclick="saveBottle()" class="px-10 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-3xl">Save Bottle</button>
        </div>
    </div>
</div>

<script>
// ==================== SUPABASE CONFIG (YOUR CREDENTIALS) ====================
const SUPABASE_URL = 'https://yjubbxcngjmttqvvyaga.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqdWJieGNuZ2ptdHRxdnZ5YWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzIwOTEsImV4cCI6MjA5MTE0ODA5MX0.OFrKx_8dGk_IzK04gOmA95Vzu4LD9wDv6xdHiW3MJwY';

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== REST OF THE APP (days, bottles logic, etc.) ====================
const daysOfWeek = [
    {short: "M", full: "Monday"}, {short: "T", full: "Tuesday"}, {short: "W", full: "Wednesday"},
    {short: "Th", full: "Thursday"}, {short: "F", full: "Friday"}, {short: "Sa", full: "Saturday"},
    {short: "Su", full: "Sunday"}
];

let bottles = [];
let editingBottleId = null;
let currentDayIndex = 0;
let currentUser = null;

// Update auth status
async function updateAuthStatus() {
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user;
    const statusEl = document.getElementById('auth-status');
    
    if (user) {
        if (user.email) {
            statusEl.textContent = `Signed in as ${user.email}`;
            statusEl.classList.add('text-emerald-600');
        } else {
            statusEl.textContent = 'Signed in anonymously';
        }
    } else {
        statusEl.textContent = 'Not signed in (data local only)';
        statusEl.classList.remove('text-emerald-600');
    }
}

// Sign in functions
async function signInWithGoogle() {
    const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
    if (error) alert('Google sign-in error: ' + error.message);
}

async function signInAnonymously() {
    const { error } = await supabase.auth.signInAnonymously();
    if (error) alert('Anonymous sign-in error: ' + error.message);
    else updateAuthStatus();
}

// Cloud sync functions
async function syncToCloud() {
    if (!currentUser) {
        alert("Please sign in first (Google or Anonymous)");
        return;
    }
    const { error } = await supabase.from('bottles').upsert({
        user_id: currentUser.id,
        data: bottles
    }, { onConflict: 'user_id' });
    
    if (error) alert('Save failed: ' + error.message);
    else alert('✅ Successfully saved to cloud!');
}

async function loadFromCloud() {
    if (!currentUser) {
        alert("Please sign in first");
        return;
    }
    const { data, error } = await supabase.from('bottles').select('data').eq('user_id', currentUser.id).single();
    
    if (error && error.code !== 'PGRST116') {
        alert('Load failed: ' + error.message);
        return;
    }
    if (data && data.data) {
        bottles = data.data;
        saveData(); // also save locally
        renderBottles();
        renderSummary();
        alert('✅ Loaded from cloud successfully!');
    } else {
        alert('No cloud data found yet. Save something first.');
    }
}

// Local storage fallback
function saveData() {
    localStorage.setItem('supplementBottlesV4', JSON.stringify(bottles));
}

function loadData() {
    const saved = localStorage.getItem('supplementBottlesV4');
    if (saved) bottles = JSON.parse(saved);
}

// The rest of your app logic (renderBottles, calculateTotalsForDay, renderSummary, modal functions, quick schedules, etc.)
// ... (identical to the version I gave you in the previous message with "Every Day", "Every Other Day", "Once a Week")

// For space, the full logic is the same as before. Copy the entire script section from the previous full version (the one with quick buttons) and paste it here after the cloud functions above.

// Initialize
async function init() {
    loadData();
    renderBottles();
    switchTab(0);
    await updateAuthStatus();

    // Listen for auth changes
    supabase.auth.onAuthStateChange((event, session) => {
        updateAuthStatus();
    });
}

window.onload = init;
</script>
</body>
</html>
