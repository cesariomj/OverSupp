<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplement Overlap Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .bottle-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottle-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(16 185 129); }
        .day-btn { transition: all 0.2s; }
        .day-btn.active { background-color: #10b981; color: white; font-weight: 600; }
        .quick-btn { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-xl font-bold">💊</div>
            <h1 class="text-3xl font-semibold tracking-tight">Supplement Overlap</h1>
        </div>
        <div class="flex items-center gap-x-4">
            <button onclick="exportData()" class="px-4 py-2 text-sm font-medium text-emerald-600 hover:bg-emerald-50 rounded-2xl flex items-center gap-x-2">📤 Export</button>
            <button onclick="importData()" class="px-4 py-2 text-sm font-medium text-emerald-600 hover:bg-emerald-50 rounded-2xl flex items-center gap-x-2">📥 Import</button>
            <button onclick="clearAllData()" class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-2xl flex items-center gap-x-2">🗑️ Clear All</button>
        </div>
    </div>
    
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex border-b border-gray-200">
            <button onclick="switchTab(0)" id="tab-0" class="tab-button px-8 py-4 font-medium text-lg border-b-2 border-transparent hover:text-emerald-600 active">📦 My Bottles</button>
            <button onclick="switchTab(1)" id="tab-1" class="tab-button px-8 py-4 font-medium text-lg border-b-2 border-transparent hover:text-emerald-600">📊 Daily Totals & Overlaps</button>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- TAB 0: MY BOTTLES -->
    <div id="tab-content-0">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-semibold">Your Supplement Bottles</h2>
            <button onclick="showAddBottleModal()" class="flex items-center gap-x-3 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-3xl font-semibold text-lg shadow-lg shadow-emerald-500/30">
                <span class="text-2xl leading-none">+</span> ADD BOTTLE
            </button>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
            <div class="text-6xl mb-6">💊</div>
            <h3 class="text-2xl font-medium mb-2">No bottles yet</h3>
            <p class="text-gray-500">Add bottles and set when you take them.</p>
            <button onclick="showAddBottleModal()" class="mt-8 bg-emerald-600 text-white px-8 py-4 rounded-3xl font-medium">Add your first bottle →</button>
        </div>

        <div id="bottles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- TAB 1: DAILY TOTALS -->
    <div id="tab-content-1" class="hidden">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-semibold">Daily Supplement Totals</h2>
            <div class="flex gap-1" id="day-selector"></div>
        </div>
        <div id="totals-container" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8"></div>
    </div>
</div>

<!-- ADD / EDIT MODAL -->
<div id="modal" onclick="if(event.target.id === 'modal') hideModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div onclick="event.stopImmediatePropagation()" class="modal bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
        <div class="px-8 pt-8 pb-6">
            <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add New Bottle</h3>
            
            <div class="space-y-6">
                <!-- Bottle Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Bottle / Product Name</label>
                    <input id="bottle-name-input" type="text" placeholder="e.g. Nature Made Vitamin C 1000mg" 
                           class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-emerald-300 text-lg">
                </div>

                <!-- Quick Schedule Buttons -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-3">How often do you take this?</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setQuickSchedule(0)" class="quick-btn px-5 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm font-medium">Every Day</button>
                        <button onclick="setQuickSchedule(1)" class="quick-btn px-5 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm font-medium">Every Other Day</button>
                        <button onclick="setQuickSchedule(2)" class="quick-btn px-5 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm font-medium">Once a Week</button>
                    </div>
                </div>

                <!-- Individual Days -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-3">Or select specific days</label>
                    <div id="days-container" class="grid grid-cols-7 gap-3"></div>
                </div>

                <!-- Supplements -->
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-medium text-gray-600">Supplements in this bottle</label>
                        <button onclick="addSupplementRow()" class="text-emerald-600 hover:text-emerald-700 text-sm font-medium flex items-center gap-x-1">
                            <span class="text-xl">+</span> Add supplement
                        </button>
                    </div>
                    <div id="supplements-container" class="space-y-4 max-h-80 overflow-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 px-8 py-6 flex items-center justify-between border-t">
            <button onclick="hideModal()" class="px-8 py-4 text-gray-500 font-medium hover:bg-white rounded-3xl">Cancel</button>
            <button onclick="saveBottle()" class="px-10 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-3xl">Save Bottle</button>
        </div>
    </div>
</div>

<script>
// ==================== DATA ====================
const daysOfWeek = [
    {short: "M",  full: "Monday"},
    {short: "T",  full: "Tuesday"},
    {short: "W",  full: "Wednesday"},
    {short: "Th", full: "Thursday"},
    {short: "F",  full: "Friday"},
    {short: "Sa", full: "Saturday"},
    {short: "Su", full: "Sunday"}
];

let bottles = [];
let editingBottleId = null;
let currentDayIndex = 0; // 0 = Monday ... 6 = Sunday

// Load / Save
function loadData() {
    const saved = localStorage.getItem('supplementBottlesV3');
    if (saved) bottles = JSON.parse(saved);
}

function saveData() {
    localStorage.setItem('supplementBottlesV3', JSON.stringify(bottles));
}

function convertToMg(amount, unit) {
    if (!amount || isNaN(amount)) return null;
    const u = unit.toLowerCase().trim();
    if (u === 'mcg' || u === 'µg') return amount * 0.001;
    if (u === 'mg') return amount;
    if (u === 'g') return amount * 1000;
    return null;
}

// Render bottles list
function renderBottles() {
    const container = document.getElementById('bottles-grid');
    const empty = document.getElementById('empty-state');

    if (bottles.length === 0) {
        empty.classList.remove('hidden');
        container.innerHTML = '';
        return;
    }
    empty.classList.add('hidden');

    let html = '';
    bottles.forEach((bottle, i) => {
        const activeDays = bottle.days ? bottle.days.filter(d => d).length : 0;
        html += `
        <div class="bottle-card bg-white border border-gray-200 rounded-3xl p-6 cursor-pointer" onclick="editBottle(${i})">
            <div class="flex justify-between items-start">
                <div>
                    <h4 class="font-semibold text-xl">${bottle.name}</h4>
                    <p class="text-emerald-600 text-sm mt-1">${bottle.supplements.length} supplement${bottle.supplements.length !== 1 ? 's' : ''}</p>
                </div>
                <button onclick="event.stopImmediatePropagation(); deleteBottle(${i});" class="text-red-400 hover:text-red-600 text-2xl leading-none">×</button>
            </div>
            <div class="mt-4 flex flex-wrap gap-1">
                ${bottle.days ? bottle.days.map((taken, idx) => taken ? 
                    `<span class="bg-emerald-100 text-emerald-700 text-xs px-2.5 py-1 rounded-2xl">${daysOfWeek[idx].short}</span>` : '').join('') : ''}
                ${activeDays === 0 ? '<span class="text-amber-500 text-xs">No days selected</span>' : ''}
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

// Calculate totals for a specific day
function calculateTotalsForDay(dayIndex) {
    const map = new Map();

    bottles.forEach(bottle => {
        if (!bottle.days || !bottle.days[dayIndex]) return;

        bottle.supplements.forEach(supp => {
            const key = supp.name.toLowerCase().trim();
            if (!map.has(key)) {
                map.set(key, { displayName: supp.name, contributions: [], totalMg: 0, convertible: true });
            }
            const entry = map.get(key);
            entry.contributions.push({ bottleName: bottle.name, amount: supp.amount, unit: supp.unit });

            const mg = convertToMg(supp.amount, supp.unit);
            if (mg !== null) entry.totalMg += mg;
            else entry.convertible = false;
        });
    });

    return Array.from(map.values()).sort((a, b) => a.displayName.localeCompare(b.displayName));
}

function renderSummary() {
    const container = document.getElementById('totals-container');
    const daySelector = document.getElementById('day-selector');

    let dayHTML = '';
    daysOfWeek.forEach((day, i) => {
        const active = i === currentDayIndex ? 'active' : 'bg-white border border-gray-200 hover:border-emerald-300';
        dayHTML += `<button onclick="selectDay(${i})" class="day-btn px-4 py-2 text-sm rounded-2xl ${active}">${day.short}</button>`;
    });
    daySelector.innerHTML = dayHTML;

    const totals = calculateTotalsForDay(currentDayIndex);

    if (bottles.length === 0) {
        container.innerHTML = `<div class="text-center py-16 text-gray-400">Add bottles to see daily totals</div>`;
        return;
    }

    let html = `<div class="text-lg font-medium mb-6">Totals for <span class="text-emerald-600">${daysOfWeek[currentDayIndex].full}</span></div><div class="space-y-10">`;

    if (totals.length === 0) {
        html += `<div class="text-center py-12 text-gray-400">No supplements scheduled for ${daysOfWeek[currentDayIndex].full}</div>`;
    } else {
        totals.forEach(total => {
            const hasOverlap = total.contributions.length > 1;
            let totalDisplay = total.convertible && total.totalMg > 0 
                ? (total.totalMg >= 1000 ? `${(total.totalMg/1000).toFixed(1)} g` : total.totalMg < 1 ? `${(total.totalMg*1000).toFixed(0)} mcg` : `${total.totalMg.toFixed(1)} mg`)
                : `<span class="text-amber-500 text-sm">(mixed units)</span>`;

            html += `
            <div class="border-l-4 ${hasOverlap ? 'border-amber-400' : 'border-emerald-400'} pl-6">
                <div class="flex justify-between items-baseline">
                    <div class="flex items-center gap-x-3">
                        <span class="text-2xl">${hasOverlap ? '⚠️' : '✅'}</span>
                        <h4 class="font-semibold text-xl">${total.displayName}</h4>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-semibold">${totalDisplay}</div>
                    </div>
                </div>
                <div class="mt-6 grid grid-cols-2 gap-4 text-sm">
                    ${total.contributions.map(c => `
                        <div class="bg-gray-50 rounded-2xl px-4 py-3">
                            <div class="font-medium">${c.bottleName}</div>
                            <div class="text-emerald-600">${c.amount} ${c.unit}</div>
                        </div>
                    `).join('')}
                </div>
                ${hasOverlap ? `<div class="mt-4 text-amber-600 text-xs">⚠️ Overlap detected on this day</div>` : ''}
            </div>`;
        });
    }
    html += `</div>`;
    container.innerHTML = html;
}

function selectDay(dayIndex) {
    currentDayIndex = dayIndex;
    renderSummary();
}

// Quick schedule functions
function setQuickSchedule(mode) {
    const checkboxes = document.querySelectorAll('#days-container input[type="checkbox"]');
    
    if (mode === 0) { // Every Day
        checkboxes.forEach(cb => cb.checked = true);
    } 
    else if (mode === 1) { // Every Other Day: Mon, Wed, Fri, Sun
        checkboxes.forEach((cb, i) => {
            cb.checked = (i % 2 === 0); // 0,2,4,6 → M W F Su
        });
    } 
    else if (mode === 2) { // Once a Week (default Monday)
        checkboxes.forEach((cb, i) => cb.checked = (i === 0));
    }
}

// Modal
function showAddBottleModal() {
    editingBottleId = null;
    document.getElementById('modal-title').textContent = 'Add New Bottle';
    document.getElementById('bottle-name-input').value = '';

    // Render day checkboxes
    let daysHTML = '';
    daysOfWeek.forEach((day, i) => {
        daysHTML += `
            <label class="flex flex-col items-center cursor-pointer group">
                <input type="checkbox" id="day-${i}" class="w-6 h-6 accent-emerald-600">
                <span class="text-xs mt-1.5 group-hover:text-emerald-600">${day.short}</span>
            </label>`;
    });
    document.getElementById('days-container').innerHTML = daysHTML;

    document.getElementById('supplements-container').innerHTML = '';
    addSupplementRow();

    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

function addSupplementRow() {
    const container = document.getElementById('supplements-container');
    const row = document.createElement('div');
    row.className = 'supplement-row flex gap-3 items-end bg-gray-50 rounded-3xl p-4';
    row.innerHTML = `
        <div class="flex-1">
            <input type="text" placeholder="Supplement name (Vitamin C, Magnesium...)" 
                   class="w-full px-4 py-3 border border-transparent focus:border-emerald-300 rounded-3xl text-base">
        </div>
        <div class="w-28">
            <input type="number" step="0.01" value="500" 
                   class="w-full px-4 py-3 border border-transparent focus:border-emerald-300 rounded-3xl text-base">
        </div>
        <div class="w-20">
            <select class="w-full px-4 py-3 border border-transparent focus:border-emerald-300 rounded-3xl text-base">
                <option value="mg">mg</option>
                <option value="mcg">mcg</option>
                <option value="g">g</option>
                <option value="IU">IU</option>
            </select>
        </div>
        <button type="button" onclick="this.closest('.supplement-row').remove()" 
                class="text-gray-400 hover:text-red-500 text-3xl pb-2">×</button>
    `;
    container.appendChild(row);
}

function saveBottle() {
    const name = document.getElementById('bottle-name-input').value.trim();
    if (!name) return alert("Please enter a bottle name");

    const dayChecks = Array.from(document.querySelectorAll('#days-container input[type="checkbox"]')).map(cb => cb.checked);

    const rows = document.querySelectorAll('.supplement-row');
    const supplements = [];
    rows.forEach(row => {
        const inputs = row.querySelectorAll('input, select');
        const sName = inputs[0].value.trim();
        const amount = parseFloat(inputs[1].value);
        const unit = inputs[2].value;
        if (sName && !isNaN(amount)) {
            supplements.push({name: sName, amount: amount, unit: unit});
        }
    });

    if (supplements.length === 0) return alert("Please add at least one supplement");

    if (editingBottleId !== null) {
        bottles[editingBottleId].name = name;
        bottles[editingBottleId].days = dayChecks;
        bottles[editingBottleId].supplements = supplements;
    } else {
        bottles.push({
            id: Date.now(),
            name: name,
            days: dayChecks,
            supplements: supplements
        });
    }

    saveData();
    hideModal();
    renderBottles();
    renderSummary();
}

function hideModal() {
    const modal = document.getElementById('modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function editBottle(index) {
    const bottle = bottles[index];
    editingBottleId = index;

    document.getElementById('modal-title').textContent = 'Edit Bottle';
    document.getElementById('bottle-name-input').value = bottle.name;

    let daysHTML = '';
    daysOfWeek.forEach((day, i) => {
        daysHTML += `
            <label class="flex flex-col items-center cursor-pointer group">
                <input type="checkbox" id="day-${i}" class="w-6 h-6 accent-emerald-600" ${bottle.days && bottle.days[i] ? 'checked' : ''}>
                <span class="text-xs mt-1.5 group-hover:text-emerald-600">${day.short}</span>
            </label>`;
    });
    document.getElementById('days-container').innerHTML = daysHTML;

    const container = document.getElementById('supplements-container');
    container.innerHTML = '';
    bottle.supplements.forEach(s => {
        const row = document.createElement('div');
        row.className = 'supplement-row flex gap-3 items-end bg-gray-50 rounded-3xl p-4';
        row.innerHTML = `
            <div class="flex-1"><input type="text" value="${s.name}" class="w-full px-4 py-3 border border-transparent focus:border-emerald-300 rounded-3xl text-base"></div>
            <div class="w-28"><input type="number" step="0.01" value="${s.amount}" class="w-full px-4 py-3 border border-transparent focus:border-emerald-300 rounded-3xl text-base"></div>
            <div class="w-20">
                <select class="w-full px-4 py-3 border border-transparent focus:border-emerald-300 rounded-3xl text-base">
                    <option value="mg" ${s.unit==='mg'?'selected':''}>mg</option>
                    <option value="mcg" ${s.unit==='mcg'?'selected':''}>mcg</option>
                    <option value="g" ${s.unit==='g'?'selected':''}>g</option>
                    <option value="IU" ${s.unit==='IU'?'selected':''}>IU</option>
                </select>
            </div>
            <button type="button" onclick="this.closest('.supplement-row').remove()" class="text-gray-400 hover:text-red-500 text-3xl pb-2">×</button>
        `;
        container.appendChild(row);
    });

    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

function deleteBottle(index) {
    if (confirm("Delete this bottle and its data?")) {
        bottles.splice(index, 1);
        saveData();
        renderBottles();
        renderSummary();
    }
}

function clearAllData() {
    if (confirm("⚠️ Delete ALL bottles and data permanently?")) {
        bottles = [];
        localStorage.removeItem('supplementBottlesV3');
        renderBottles();
        renderSummary();
        switchTab(0);
    }
}

function exportData() {
    if (!bottles.length) return alert("Nothing to export yet");
    const dataStr = JSON.stringify(bottles, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'supplement-bottles.json';
    a.click();
    URL.revokeObjectURL(url);
}

function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                bottles = JSON.parse(ev.target.result);
                saveData();
                renderBottles();
                renderSummary();
                alert('✅ Data imported successfully!');
            } catch(err) {
                alert('Invalid file format');
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

function switchTab(n) {
    document.querySelectorAll('.tab-button').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
        btn.classList.toggle('border-emerald-500', i === n);
        btn.classList.toggle('text-emerald-600', i === n);
    });
    document.getElementById('tab-content-0').classList.toggle('hidden', n !== 0);
    document.getElementById('tab-content-1').classList.toggle('hidden', n !== 1);
    if (n === 1) renderSummary();
}

// Initialize
function init() {
    loadData();
    renderBottles();
    switchTab(0);
}

window.onload = init;
</script>
</body>
</html>
