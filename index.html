<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplement Overlap Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .bottle-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottle-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(16 185 129); }
        .day-btn.active { background-color: #10b981; color: white; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-xl font-bold">💊</div>
            <h1 class="text-3xl font-semibold tracking-tight">Supplement Overlap</h1>
        </div>
        <div class="flex items-center gap-x-4">
            <div id="auth-status" class="text-sm font-medium text-gray-600"></div>
            <button onclick="signInWithGoogle()" class="px-5 py-2 text-sm bg-white border border-gray-300 hover:border-emerald-500 rounded-2xl">Sign in with Google</button>
            <button onclick="signInAnonymously()" class="px-5 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-2xl">Anonymous</button>
            <button onclick="syncToCloud()" class="px-5 py-2 text-sm bg-emerald-600 text-white rounded-2xl">💾 Save to Cloud</button>
            <button onclick="loadFromCloud()" class="px-5 py-2 text-sm border border-emerald-300 hover:bg-emerald-50 rounded-2xl">🔄 Load from Cloud</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6">
        <div class="flex border-b border-gray-200">
            <button onclick="switchTab(0)" id="tab-0" class="tab-button px-8 py-4 font-medium text-lg border-b-2 border-transparent hover:text-emerald-600 active">📦 My Bottles</button>
            <button onclick="switchTab(1)" id="tab-1" class="tab-button px-8 py-4 font-medium text-lg border-b-2 border-transparent hover:text-emerald-600">📊 Daily Totals</button>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8">
    <div id="tab-content-0">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-semibold">Your Supplement Bottles</h2>
            <button onclick="showAddBottleModal()" class="flex items-center gap-x-3 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-3xl font-semibold text-lg">+ ADD BOTTLE</button>
        </div>
        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
            <div class="text-6xl mb-6">💊</div>
            <h3 class="text-2xl font-medium">No bottles yet</h3>
        </div>
        <div id="bottles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="tab-content-1" class="hidden">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-semibold">Daily Supplement Totals</h2>
            <div class="flex gap-1" id="day-selector"></div>
        </div>
        <div id="totals-container" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8"></div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target.id === 'modal') hideModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div onclick="event.stopImmediatePropagation()" class="modal bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
        <div class="px-8 pt-8 pb-6">
            <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add New Bottle</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Bottle Name</label>
                    <input id="bottle-name-input" type="text" placeholder="e.g. Nature Made Vitamin C" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-emerald-300 text-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-3">Quick Schedule</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setQuickSchedule(0)" class="px-4 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm">Every Day</button>
                        <button onclick="setQuickSchedule(1)" class="px-4 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm">Every Other Day</button>
                        <button onclick="setQuickSchedule(2)" class="px-4 py-2 bg-white border border-gray-300 hover:border-emerald-400 rounded-3xl text-sm">Once a Week</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-3">Select Days</label>
                    <div id="days-container" class="grid grid-cols-7 gap-3"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-medium text-gray-600">Supplements</label>
                        <button onclick="addSupplementRow()" class="text-emerald-600 text-sm font-medium">+ Add supplement</button>
                    </div>
                    <div id="supplements-container" class="space-y-4 max-h-80 overflow-auto"></div>
                </div>
            </div>
        </div>
        <div class="bg-gray-50 px-8 py-6 flex items-center justify-between border-t">
            <button onclick="hideModal()" class="px-8 py-4 text-gray-500 font-medium">Cancel</button>
            <button onclick="saveBottle()" class="px-10 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-3xl">Save Bottle</button>
        </div>
    </div>
</div>

<script>
// ==================== SUPABASE CONFIG (ONLY ONCE) ====================
const SUPABASE_URL = 'https://yjubbxcngjmttqvvyaga.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqdWJieGNuZ2ptdHRxdnZ5YWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzIwOTEsImV4cCI6MjA5MTE0ODA5MX0.OFrKx_8dGk_IzK04gOmA95Vzu4LD9wDv6xdHiW3MJwY';

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SITE_URL = 'https://supplements.mczstuff.com';

// ==================== STATE ====================
const daysOfWeek = [
    {short: "M", full: "Monday"}, {short: "T", full: "Tuesday"}, {short: "W", full: "Wednesday"},
    {short: "Th", full: "Thursday"}, {short: "F", full: "Friday"}, {short: "Sa", full: "Saturday"}, {short: "Su", full: "Sunday"}
];

let bottles = [];
let editingBottleId = null;
let currentDayIndex = 0;

// ==================== AUTH FUNCTIONS ====================
async function updateAuthStatus() {
    const { data: { user } } = await supabase.auth.getUser();
    const el = document.getElementById('auth-status');
    el.textContent = user ? (user.email || 'Anonymous') : 'Not signed in';
}

async function signInWithGoogle() {
    const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: SITE_URL }
    });
    if (error) alert('Google sign-in error: ' + error.message);
}

async function signInAnonymously() {
    const { error } = await supabase.auth.signInAnonymously();
    if (error) alert(error.message);
    else updateAuthStatus();
}

async function syncToCloud() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return alert("Please sign in first");
    const { error } = await supabase.from('bottles').upsert({ user_id: user.id, data: bottles });
    alert(error ? 'Save failed' : '✅ Saved to cloud!');
}

async function loadFromCloud() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return alert("Please sign in first");
    const { data, error } = await supabase.from('bottles').select('data').eq('user_id', user.id).single();
    if (data?.data) {
        bottles = data.data;
        localStorage.setItem('supplementBottles', JSON.stringify(bottles));
        renderBottles();
        renderSummary();
        alert('✅ Loaded from cloud!');
    } else {
        alert('No cloud data found yet');
    }
}

// ==================== LOCAL STORAGE ====================
function loadLocal() {
    const saved = localStorage.getItem('supplementBottles');
    if (saved) bottles = JSON.parse(saved);
}

function saveLocal() {
    localStorage.setItem('supplementBottles', JSON.stringify(bottles));
}

// ==================== BOTTLE FUNCTIONS (Simplified for now) ====================
function renderBottles() {
    const container = document.getElementById('bottles-grid');
    const empty = document.getElementById('empty-state');
    if (bottles.length === 0) {
        empty.classList.remove('hidden');
        container.innerHTML = '';
        return;
    }
    empty.classList.add('hidden');
    // Simple render - you can expand later
    container.innerHTML = bottles.map((b, i) => `
        <div class="bottle-card bg-white border border-gray-200 rounded-3xl p-6" onclick="editBottle(${i})">
            <h4 class="font-semibold">${b.name}</h4>
        </div>
    `).join('');
}

function showAddBottleModal() {
    alert("Add bottle modal - full version coming if this works");
    // We'll expand this once the auth part is fixed
}

function switchTab(n) {
    document.getElementById('tab-content-0').classList.toggle('hidden', n !== 0);
    document.getElementById('tab-content-1').classList.toggle('hidden', n !== 1);
}

async function init() {
    loadLocal();
    renderBottles();
    switchTab(0);
    await updateAuthStatus();

    supabase.auth.onAuthStateChange(() => updateAuthStatus());
}

window.onload = init;
</script>
</body>
</html>
